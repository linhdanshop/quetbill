<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QuetBill Web</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#f4f6f8; color:#111; }
    header {
      position: sticky; top:0; z-index:20;
      background:#fff; border-bottom:1px solid #ddd;
      padding:8px 10px;
    }
    .topline {
      display:flex; gap:8px; align-items:center;
      flex-wrap:nowrap; overflow-x:auto; white-space:nowrap;
    }
    .brand { font-size:20px; font-weight:800; margin-right:4px; }
    input, select, button {
      height:34px; padding:5px 9px; border:1px solid #bbb;
      border-radius:6px; font-size:14px; background:#fff;
    }
    button { cursor:pointer; font-weight:700; }
    .primary { background:#1976d2; color:#fff; border-color:#1976d2; }
    .green { background:#2e7d32; color:#fff; border-color:#2e7d32; }
    .danger { background:#d32f2f; color:#fff; border-color:#d32f2f; }
    .status { font-size:13px; padding:7px 8px; border-radius:6px; background:#eee; }
    .wrap { padding:10px; }
    .table-wrap {
      background:#fff; border:1px solid #ddd; overflow:auto;
      max-height:calc(100vh - 58px);
    }
    table { width:100%; border-collapse:collapse; min-width:1160px; }
    th, td { border:1px solid #ddd; padding:6px 8px; font-size:14px; white-space:nowrap; }
    th { position:sticky; top:0; z-index:5; background:#f1f3f4; text-align:left; }
    .filter-row th {
      top:34px; background:#fafafa; z-index:4; padding:4px;
    }
    .filter-row input, .filter-row select {
      width:100%; height:28px; padding:3px 6px; font-size:13px;
    }
    td[contenteditable="true"] { background:#fffdf4; outline:none; }
    tr:hover td { background:#f5faff; }
    tr.changed td { background:#fff3cd !important; }
    tr.done td { background:#eee; color:#555; }
    tr.selected td { outline:2px solid #1976d2; outline-offset:-2px; }
    .msp { color:#1565c0; font-weight:700; }
    .gia { color:#d32f2f; font-weight:700; text-align:right; }
    .num { text-align:right; }
    .muted { color:#666; font-size:12px; }
    .pill { display:inline-block; padding:3px 8px; border-radius:999px; font-size:12px; font-weight:700; }
    .todo-pill { background:#e8f5e9; color:#1b5e20; }
    .done-pill { background:#eee; color:#555; }
    .check { width:18px; height:18px; }
    .login-box {
      background:#fff; border:1px solid #ddd; margin:12px; padding:12px;
      border-radius:8px; max-width:520px;
    }
    .login-box input { width:100%; margin:4px 0; }
    .hidden { display:none; }
  </style>
</head>
<body>

<header>
  <div class="topline">
    <div class="brand">QuetBill</div>

    <select id="liveSelect"></select>
    <input id="customLive" placeholder="LIVE 30/5/2026" style="width:170px" />
    <button id="btnUseLive" class="primary">Mở</button>

    <input id="globalSearch" placeholder="Tìm nhanh..." style="width:210px" />

    <button id="btnCopySelected" class="green">Copy 3 cột</button>
    <button id="btnAdd" class="primary">Thêm</button>

    <span id="selectedInfo" class="status">Chọn: 0</span>
    <span id="status" class="status">Chưa đăng nhập</span>
  </div>
</header>

<div id="loginBox" class="login-box">
  <b>Đăng nhập Firebase</b>
  <input id="email" placeholder="Gmail" />
  <input id="password" placeholder="Mật khẩu" type="password" />
  <button id="btnLogin" class="primary">Đăng nhập</button>
</div>

<div class="wrap">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:42px"><input id="checkAll" type="checkbox" class="check"></th>
          <th style="width:55px">STT</th>
          <th style="width:95px">Đã làm</th>
          <th>MSP</th>
          <th>SĐT</th>
          <th>Giá</th>
          <th>NV</th>
          <th>Time</th>
          <th>Note</th>
          <th>ID</th>
          <th style="width:120px">Thao tác</th>
        </tr>
        <tr class="filter-row">
          <th></th>
          <th></th>
          <th>
            <select id="doneFilter">
              <option value="all">Tất cả</option>
              <option value="todo">Chưa làm</option>
              <option value="done">Đã làm</option>
            </select>
          </th>
          <th><input id="mspFilter" placeholder="lọc MSP"></th>
          <th><input id="sdtFilter" placeholder="lọc SĐT"></th>
          <th>
            <select id="priceOp" style="width:42%;display:inline-block">
              <option value="">--</option>
              <option value=">">&gt;</option>
              <option value=">=">&gt;=</option>
              <option value="<">&lt;</option>
              <option value="<=">&lt;=</option>
              <option value="=">=</option>
            </select>
            <input id="priceFilter" placeholder="100000" style="width:56%;display:inline-block">
          </th>
          <th><input id="staffFilter" placeholder="lọc NV"></th>
          <th></th>
          <th><input id="noteFilter" placeholder="lọc note"></th>
          <th></th>
          <th><button id="btnClearFilters">Xóa lọc</button></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="11">Chưa có dữ liệu</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getDatabase, ref, onValue, update, remove, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtBtiBITO9ftLpECphG6hDETxx8Pf09UM",
  authDomain: "quet-bill.firebaseapp.com",
  databaseURL: "https://quet-bill-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "quet-bill",
  storageBucket: "quet-bill.firebasestorage.app",
  messagingSenderId: "569894614254",
  appId: "1:569894614254:android:4a64b3a384f18ef614afff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const $ = (id) => document.getElementById(id);

let currentLive = "";
let currentLiveKey = "";
let rows = [];
let visibleRows = [];
let selectedKeys = new Set();
let unsubscribe = null;

function safeKey(text) {
  return String(text || "")
    .trim()
    .replaceAll(".", "_").replaceAll("#", "_").replaceAll("$", "_")
    .replaceAll("[", "_").replaceAll("]", "_").replaceAll("/", "_")
    .replaceAll("\\", "_").replaceAll(" ", "_");
}

function todayLive(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return `LIVE ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
}

function normalize(text) {
  return String(text || "")
    .trim().toUpperCase().normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ");
}

function makeId(live, msp, sdt) {
  return safeKey(normalize(live)) + "__" + safeKey(normalize(msp)) + "__" + safeKey(String(sdt || ""));
}

function fillLiveSelect() {
  const select = $("liveSelect");
  select.innerHTML = "";
  [0,1,2,3,4,5,6].forEach(i => {
    const live = todayLive(i);
    const opt = document.createElement("option");
    opt.value = live;
    opt.textContent = live;
    select.appendChild(opt);
  });
}

function isDone(row) { return row.done === true; }
function setStatus(text) { $("status").textContent = text; }
function fmtGia(v) {
  const n = Number(String(v || "").replace(/[^\d]/g, ""));
  if (!n) return String(v || "");
  return n.toLocaleString("en-US");
}
function rawGia(v) {
  return String(v || "").replace(/[^\d]/g, "");
}

function openLive(liveName) {
  if (!liveName) return alert("Chưa nhập LIVE");
  currentLive = liveName;
  currentLiveKey = safeKey(liveName);
  selectedKeys.clear();
  updateSelectedInfo();

  if (unsubscribe) unsubscribe();
  const liveRef = ref(db, `campaigns/${currentLiveKey}/scans`);

  unsubscribe = onValue(liveRef, (snap) => {
    const val = snap.val() || {};
    rows = Object.keys(val).map(key => ({ key, ...val[key] }));
    rows.sort((a,b) => Number(a.createdAt || 0) - Number(b.createdAt || 0));
    render();
    setStatus(`${currentLive} | Tổng: ${rows.length}`);
  }, err => alert("Firebase lỗi: " + err.message));
}

function contains(a,b) {
  return String(a || "").toLowerCase().includes(String(b || "").toLowerCase());
}

function getFilteredRows() {
  const q = $("globalSearch").value.trim().toLowerCase();
  const doneF = $("doneFilter").value;
  const mspF = $("mspFilter").value.trim();
  const sdtF = $("sdtFilter").value.trim();
  const staffF = $("staffFilter").value.trim();
  const noteF = $("noteFilter").value.trim();
  const op = $("priceOp").value;
  const priceVal = Number(rawGia($("priceFilter").value));

  return rows.filter(r => {
    if (doneF === "todo" && isDone(r)) return false;
    if (doneF === "done" && !isDone(r)) return false;

    if (mspF && !contains(r.msp, mspF)) return false;
    if (sdtF && !contains(r.sdt, sdtF)) return false;
    if (staffF && !contains(r.staff, staffF)) return false;
    if (noteF && !contains(r.note, noteF)) return false;

    if (op && priceVal) {
      const p = Number(rawGia(r.gia));
      if (op === ">" && !(p > priceVal)) return false;
      if (op === ">=" && !(p >= priceVal)) return false;
      if (op === "<" && !(p < priceVal)) return false;
      if (op === "<=" && !(p <= priceVal)) return false;
      if (op === "=" && !(p === priceVal)) return false;
    }

    if (q) {
      const hay = [r.id, r.msp, r.sdt, r.gia, r.staff, r.note, r.time].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }

    return true;
  });
}

function render() {
  const tbody = $("tbody");
  tbody.innerHTML = "";
  visibleRows = getFilteredRows();

  if (!visibleRows.length) {
    tbody.innerHTML = `<tr><td colspan="11">Không có dữ liệu</td></tr>`;
    updateSelectedInfo();
    $("checkAll").checked = false;
    return;
  }

  visibleRows.forEach((r, index) => {
    const tr = document.createElement("tr");
    tr.dataset.key = r.key;
    tr.classList.add(isDone(r) ? "done" : "todo");
    if (selectedKeys.has(r.key)) tr.classList.add("selected");

    tr.innerHTML = `
      <td><input class="rowCheck check" type="checkbox" ${selectedKeys.has(r.key) ? "checked" : ""}></td>
      <td class="num">${index + 1}</td>
      <td>${isDone(r) ? '<span class="pill done-pill">Đã làm</span>' : '<span class="pill todo-pill">Chưa làm</span>'}</td>
      <td contenteditable="true" data-field="msp" class="msp">${escapeHtml(r.msp || "")}</td>
      <td contenteditable="true" data-field="sdt">${escapeHtml(r.sdt || "")}</td>
      <td contenteditable="true" data-field="gia" class="gia">${escapeHtml(fmtGia(r.gia))}</td>
      <td contenteditable="true" data-field="staff">${escapeHtml(r.staff || "")}</td>
      <td>${escapeHtml(r.time || "")}</td>
      <td contenteditable="true" data-field="note">${escapeHtml(r.note || "")}</td>
      <td class="muted">${escapeHtml(r.id || r.key || "")}</td>
      <td><button data-action="save">Lưu</button> <button data-action="delete" class="danger">Xóa</button></td>
    `;

    tr.querySelector(".rowCheck").addEventListener("change", (e) => {
      if (e.target.checked) selectedKeys.add(r.key);
      else selectedKeys.delete(r.key);
      render();
    });

    tr.querySelectorAll("[contenteditable=true]").forEach(td => {
      td.addEventListener("input", () => tr.classList.add("changed"));
    });

    tbody.appendChild(tr);
  });

  $("checkAll").checked = visibleRows.length > 0 && visibleRows.every(r => selectedKeys.has(r.key));
  updateSelectedInfo();
}

function escapeHtml(s) {
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function selectedRows() { return rows.filter(r => selectedKeys.has(r.key)); }
function updateSelectedInfo() { $("selectedInfo").textContent = `Chọn: ${selectedKeys.size}`; }

async function setDone(key, done) {
  await update(ref(db, `campaigns/${currentLiveKey}/scans/${key}`), {
    done,
    doneAt: done ? serverTimestamp() : null,
    sheetStatus: "pending"
  });
}

async function copySelectedAndMarkDone() {
  const list = selectedRows();
  if (!list.length) return alert("Phải tick checkbox dòng cần copy trước");

  const text = list.map(r => `${r.msp || ""}\t${r.sdt || ""}\t${rawGia(r.gia)}`).join("\n");
  await navigator.clipboard.writeText(text);
  await Promise.all(list.map(r => setDone(r.key, true)));

  selectedKeys.clear();
  render();
  alert(`Đã copy ${list.length} dòng và đánh dấu đã làm`);
}

async function saveRow(tr) {
  const key = tr.dataset.key;
  const old = rows.find(r => r.key === key);
  if (!old) return;

  const data = {};
  tr.querySelectorAll("[data-field]").forEach(td => {
    data[td.dataset.field] = td.dataset.field === "gia" ? rawGia(td.textContent) : td.textContent.trim();
  });

  data.updatedAt = serverTimestamp();
  data.sheetStatus = "pending";

  const newId = makeId(old.campaign || currentLive, data.msp, data.sdt);
  if ((data.msp !== old.msp || data.sdt !== old.sdt) && newId !== key) {
    if (!confirm("MSP/SĐT thay đổi nên tạo dòng mới và xóa dòng cũ. Tiếp tục?")) return;

    const newData = {
      ...old, ...data,
      id: newId,
      createdAt: old.createdAt || serverTimestamp(),
      updatedAt: serverTimestamp(),
      sheetStatus: "pending"
    };

    await set(ref(db, `campaigns/${currentLiveKey}/scans/${newId}`), newData);
    await remove(ref(db, `campaigns/${currentLiveKey}/scans/${key}`));
    selectedKeys.delete(key);
    return;
  }

  data.id = old.id || key;
  await update(ref(db, `campaigns/${currentLiveKey}/scans/${key}`), data);
  tr.classList.remove("changed");
}

async function deleteRow(tr) {
  const key = tr.dataset.key;
  if (!key) return;
  if (!confirm("Xóa dòng này khỏi Firebase? App đang mở LIVE này cũng sẽ mất dòng đó.")) return;
  await remove(ref(db, `campaigns/${currentLiveKey}/scans/${key}`));
  selectedKeys.delete(key);
}

async function addRow() {
  if (!currentLive) return alert("Chưa mở LIVE");
  const msp = prompt("MSP?"); if (!msp) return;
  const sdt = prompt("SĐT?"); if (!sdt) return;
  const gia = rawGia(prompt("Giá?")); if (!gia) return;
  const staff = prompt("NV?", "An") || "";
  const time = new Date().toLocaleString("vi-VN", {
    day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false
  }).replace(",", "");

  const id = makeId(currentLive, msp, sdt);
  await set(ref(db, `campaigns/${currentLiveKey}/scans/${id}`), {
    id, msp, sdt, gia, staff, time,
    campaign: currentLive,
    note: "",
    done: false,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
    sheetStatus: "pending"
  });
}

$("tbody").addEventListener("click", async (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  const tr = e.target.closest("tr");
  if (!tr) return;

  try {
    if (btn.dataset.action === "save") await saveRow(tr);
    if (btn.dataset.action === "delete") await deleteRow(tr);
  } catch (err) {
    console.error(err);
    alert("Lỗi: " + err.message);
  }
});

$("btnLogin").addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
  } catch (err) {
    alert("Đăng nhập lỗi: " + err.message);
  }
});

$("btnUseLive").addEventListener("click", () => openLive($("customLive").value.trim() || $("liveSelect").value));
$("liveSelect").addEventListener("change", () => $("customLive").value = $("liveSelect").value);

[
  "globalSearch", "doneFilter", "mspFilter", "sdtFilter", "staffFilter", "noteFilter", "priceOp", "priceFilter"
].forEach(id => $(id).addEventListener("input", render));
$("doneFilter").addEventListener("change", render);
$("priceOp").addEventListener("change", render);

$("checkAll").addEventListener("change", (e) => {
  if (e.target.checked) visibleRows.forEach(r => selectedKeys.add(r.key));
  else visibleRows.forEach(r => selectedKeys.delete(r.key));
  render();
});

$("btnCopySelected").addEventListener("click", copySelectedAndMarkDone);
$("btnAdd").addEventListener("click", addRow);
$("btnClearFilters").addEventListener("click", () => {
  ["globalSearch","mspFilter","sdtFilter","staffFilter","noteFilter","priceFilter"].forEach(id => $(id).value = "");
  $("doneFilter").value = "all";
  $("priceOp").value = "";
  selectedKeys.clear();
  render();
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    $("loginBox").classList.add("hidden");
    setStatus("Đã đăng nhập: " + user.email);
    openLive($("liveSelect").value);
  } else {
    $("loginBox").classList.remove("hidden");
    setStatus("Chưa đăng nhập");
  }
});

fillLiveSelect();
$("customLive").value = $("liveSelect").value;
</script>
</body>
</html>
