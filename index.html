<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QuetBill Firebase Web</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 10px 14px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 10px;
    }
    .bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, select, button {
      height: 36px;
      padding: 6px 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }
    button {
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }
    button.danger {
      background: #d32f2f;
      color: white;
      border-color: #d32f2f;
    }
    button.green {
      background: #2e7d32;
      color: white;
      border-color: #2e7d32;
    }
    .status {
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #eee;
    }
    .wrap {
      padding: 12px;
    }
    .table-wrap {
      background: white;
      border: 1px solid #ddd;
      overflow: auto;
      max-height: calc(100vh - 150px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      font-size: 14px;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f1f3f4;
      font-weight: 700;
      text-align: left;
    }
    td[contenteditable="true"] {
      background: #fffdf4;
      outline: none;
    }
    tr.changed td {
      background: #fff3cd !important;
    }
    tr.new td {
      background: #e8f5e9 !important;
    }
    tr:hover td {
      background: #f5faff;
    }
    .num {
      text-align: right;
    }
    .msp {
      color: #1565c0;
      font-weight: 600;
    }
    .gia {
      color: #d32f2f;
      font-weight: 600;
    }
    .muted {
      color: #666;
      font-size: 12px;
    }
    .login-box {
      background: #fff;
      border: 1px solid #ddd;
      margin: 12px;
      padding: 12px;
      border-radius: 8px;
      max-width: 520px;
    }
    .login-box input {
      width: 100%;
      margin: 4px 0;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>QuetBill Firebase Web</h1>
    <div class="bar">
      <select id="liveSelect"></select>
      <input id="customLive" placeholder="LIVE tùy chỉnh vd: LIVE 30/5/2026" style="width:220px" />
      <button id="btnUseLive">Mở LIVE</button>
      <input id="search" placeholder="Tìm MSP/SĐT/Giá/NV/Note..." style="width:250px" />
      <button id="btnExport" class="green">Copy 3 cột MSP | SĐT | Giá</button>
      <button id="btnAdd" class="primary">Thêm dòng</button>
      <span id="status" class="status">Chưa đăng nhập</span>
    </div>
  </header>

  <div id="loginBox" class="login-box">
    <b>Đăng nhập Firebase</b>
    <div class="muted">Dùng 1 trong 4 Gmail đã cấp quyền.</div>
    <input id="email" placeholder="Gmail" />
    <input id="password" placeholder="Mật khẩu" type="password" />
    <button id="btnLogin" class="primary">Đăng nhập</button>
  </div>

  <div class="wrap">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:60px">STT</th>
            <th>ID</th>
            <th>MSP</th>
            <th>SĐT</th>
            <th>Giá</th>
            <th>NV</th>
            <th>Time</th>
            <th>LIVE</th>
            <th>Note</th>
            <th style="width:170px">Thao tác</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="10">Chưa có dữ liệu</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getDatabase,
    ref,
    onValue,
    update,
    remove,
    set,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBtBtiBITO9ftLpECphG6hDETxx8Pf09UM",
    authDomain: "quet-bill.firebaseapp.com",
    databaseURL: "https://quet-bill-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "quet-bill",
    storageBucket: "quet-bill.firebasestorage.app",
    messagingSenderId: "569894614254",
    appId: "1:569894614254:android:4a64b3a384f18ef614afff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const $ = (id) => document.getElementById(id);

  let currentLive = "";
  let currentLiveKey = "";
  let rows = [];
  let unsubscribe = null;

  function safeKey(text) {
    return String(text || "")
      .trim()
      .replaceAll(".", "_")
      .replaceAll("#", "_")
      .replaceAll("$", "_")
      .replaceAll("[", "_")
      .replaceAll("]", "_")
      .replaceAll("/", "_")
      .replaceAll("\\", "_")
      .replaceAll(" ", "_");
  }

  function todayLive(offset = 0) {
    const d = new Date();
    d.setDate(d.getDate() - offset);
    return `LIVE ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
  }

  function normalize(text) {
    return String(text || "")
      .trim()
      .toUpperCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, " ");
  }

  function makeId(live, msp, sdt) {
    return safeKey(normalize(live)) + "__" + safeKey(normalize(msp)) + "__" + safeKey(String(sdt || ""));
  }

  function fillLiveSelect() {
    const select = $("liveSelect");
    select.innerHTML = "";
    [0, 1, 2, 3, 4, 5, 6].forEach(i => {
      const live = todayLive(i);
      const opt = document.createElement("option");
      opt.value = live;
      opt.textContent = live;
      select.appendChild(opt);
    });
  }

  function setStatus(text) {
    $("status").textContent = text;
  }

  function openLive(liveName) {
    if (!liveName) return alert("Chưa nhập LIVE");
    currentLive = liveName;
    currentLiveKey = safeKey(liveName);
    setStatus("Đang mở " + currentLive);

    const liveRef = ref(db, `campaigns/${currentLiveKey}/scans`);

    if (unsubscribe) unsubscribe();

    unsubscribe = onValue(liveRef, (snap) => {
      const val = snap.val() || {};
      rows = Object.keys(val).map(key => ({
        key,
        ...val[key]
      }));

      rows.sort((a, b) => {
        const aa = Number(a.createdAt || 0);
        const bb = Number(b.createdAt || 0);
        return aa - bb; // cũ ở trên, mới ở dưới giống Sheet
      });

      render();
      setStatus(`LIVE: ${currentLive} | Tổng: ${rows.length}`);
    }, (err) => {
      console.error(err);
      alert("Firebase lỗi: " + err.message);
    });
  }

  function render() {
    const q = $("search").value.trim().toLowerCase();
    const tbody = $("tbody");
    tbody.innerHTML = "";

    let filtered = rows;
    if (q) {
      filtered = rows.filter(r =>
        String(r.id || "").toLowerCase().includes(q) ||
        String(r.msp || "").toLowerCase().includes(q) ||
        String(r.sdt || "").toLowerCase().includes(q) ||
        String(r.gia || "").toLowerCase().includes(q) ||
        String(r.staff || "").toLowerCase().includes(q) ||
        String(r.note || "").toLowerCase().includes(q)
      );
    }

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="10">Không có dữ liệu</td></tr>`;
      return;
    }

    filtered.forEach((r, index) => {
      const tr = document.createElement("tr");
      tr.dataset.key = r.key;

      tr.innerHTML = `
        <td class="num">${index + 1}</td>
        <td class="muted">${escapeHtml(r.id || r.key || "")}</td>
        <td contenteditable="true" data-field="msp" class="msp">${escapeHtml(r.msp || "")}</td>
        <td contenteditable="true" data-field="sdt">${escapeHtml(r.sdt || "")}</td>
        <td contenteditable="true" data-field="gia" class="gia">${escapeHtml(r.gia || "")}</td>
        <td contenteditable="true" data-field="staff">${escapeHtml(r.staff || "")}</td>
        <td>${escapeHtml(r.time || "")}</td>
        <td>${escapeHtml(r.campaign || currentLive)}</td>
        <td contenteditable="true" data-field="note">${escapeHtml(r.note || "")}</td>
        <td>
          <button data-action="save">Lưu</button>
          <button data-action="delete" class="danger">Xóa</button>
        </td>
      `;

      tr.querySelectorAll("[contenteditable=true]").forEach(td => {
        td.addEventListener("input", () => tr.classList.add("changed"));
      });

      tbody.appendChild(tr);
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  async function saveRow(tr) {
    const key = tr.dataset.key;
    if (!key) return;

    const old = rows.find(r => r.key === key);
    if (!old) return;

    const data = {};
    tr.querySelectorAll("[data-field]").forEach(td => {
      data[td.dataset.field] = td.textContent.trim();
    });

    data.updatedAt = serverTimestamp();
    data.sheetStatus = "pending";

    // Nếu sửa MSP/SĐT thì ID chống trùng sẽ đổi. Ta tạo dòng mới, xóa dòng cũ.
    const newId = makeId(old.campaign || currentLive, data.msp, data.sdt);
    if ((data.msp !== old.msp || data.sdt !== old.sdt) && newId !== key) {
      if (!confirm("MSP/SĐT thay đổi nên hệ thống sẽ tạo ID mới và xóa dòng cũ. Tiếp tục?")) return;

      const newData = {
        ...old,
        ...data,
        id: newId,
        createdAt: old.createdAt || serverTimestamp(),
        updatedAt: serverTimestamp(),
        sheetStatus: "pending"
      };

      await set(ref(db, `campaigns/${currentLiveKey}/scans/${newId}`), newData);
      await remove(ref(db, `campaigns/${currentLiveKey}/scans/${key}`));
      return;
    }

    data.id = old.id || key;
    await update(ref(db, `campaigns/${currentLiveKey}/scans/${key}`), data);
    tr.classList.remove("changed");
  }

  async function deleteRow(tr) {
    const key = tr.dataset.key;
    if (!key) return;
    if (!confirm("Xóa dòng này khỏi Firebase? App đang mở LIVE này cũng sẽ mất dòng đó.")) return;
    await remove(ref(db, `campaigns/${currentLiveKey}/scans/${key}`));
  }

  async function addRow() {
    if (!currentLive) return alert("Chưa mở LIVE");

    const msp = prompt("MSP?");
    if (!msp) return;

    const sdt = prompt("SĐT?");
    if (!sdt) return;

    const gia = prompt("Giá?");
    if (!gia) return;

    const staff = prompt("NV?", "An") || "";
    const time = new Date().toLocaleString("vi-VN", {
      day: "2-digit", month: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false
    }).replace(",", "");

    const id = makeId(currentLive, msp, sdt);
    const item = {
      id, msp, sdt, gia, staff,
      time,
      campaign: currentLive,
      note: "",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
      sheetStatus: "pending"
    };

    await set(ref(db, `campaigns/${currentLiveKey}/scans/${id}`), item);
  }

  function copyThreeColumns() {
    const text = rows.map(r => `${r.msp || ""}\t${r.sdt || ""}\t${r.gia || ""}`).join("\n");
    navigator.clipboard.writeText(text).then(() => {
      alert(`Đã copy ${rows.length} dòng MSP | SĐT | Giá`);
    });
  }

  $("tbody").addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const tr = e.target.closest("tr");
    if (!tr) return;

    try {
      if (btn.dataset.action === "save") await saveRow(tr);
      if (btn.dataset.action === "delete") await deleteRow(tr);
    } catch (err) {
      console.error(err);
      alert("Lỗi: " + err.message);
    }
  });

  $("btnLogin").addEventListener("click", async () => {
    try {
      await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
    } catch (err) {
      alert("Đăng nhập lỗi: " + err.message);
    }
  });

  $("btnUseLive").addEventListener("click", () => {
    const custom = $("customLive").value.trim();
    openLive(custom || $("liveSelect").value);
  });

  $("liveSelect").addEventListener("change", () => {
    $("customLive").value = $("liveSelect").value;
  });

  $("search").addEventListener("input", render);
  $("btnExport").addEventListener("click", copyThreeColumns);
  $("btnAdd").addEventListener("click", addRow);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      $("loginBox").classList.add("hidden");
      setStatus("Đã đăng nhập: " + user.email);
      openLive($("liveSelect").value);
    } else {
      $("loginBox").classList.remove("hidden");
      setStatus("Chưa đăng nhập");
    }
  });

  fillLiveSelect();
  $("customLive").value = $("liveSelect").value;
</script>
</body>
</html>
